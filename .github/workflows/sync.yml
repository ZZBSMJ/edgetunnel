name: Force Sync beta2.0 from upstream 

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  force-sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout control branch (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream

      - name: Force sync beta2.0 with upstream
        run: |
          git checkout -B beta2.0 upstream/beta2.0

      - name: Force push beta2.0
        run: |
          git push origin beta2.0 --force
